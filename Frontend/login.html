<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Booking - Giriş</title>


    <style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: #f8f9fa;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-box {
        background: white;
        width: 380px;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(196, 30, 58, 0.15);
        text-align: center;
        border-top: 5px solid #c41e3a;
    }

    .login-box h1 {
        margin-top: 0;
        margin-bottom: 30px;
        color: #c41e3a;
        font-size: 28px;
    }

    .login-box input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .login-box input:focus {
        outline: none;
        border-color: #c41e3a;
        box-shadow: 0 0 8px rgba(196, 30, 58, 0.15);
    }

    .login-box button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #c41e3a 0%, #8b1a2e 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(196, 30, 58, 0.2);
    }

    .login-box button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }

    .login-box button:active {
        transform: translateY(0);
    }

    .login-box a {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #c41e3a;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .login-box a:hover {
        color: #8b1a2e;
        text-decoration: underline;
    }

    #result {
        margin-top: 15px;
        font-size: 14px;
        padding: 10px;
        border-radius: 6px;
    }

    #result.error {
        background-color: #ffebee;
        color: #c41e3a;
        border: 2px solid #c41e3a;
    }

    #result.success {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 2px solid #4caf50;
    }
</style>


</head>
<body>

    <div class="login-box">
        <h1>Uçuş Booking</h1>

        <input type="text" id="username" placeholder="İstifadəçi adı" required>
        <input type="password" id="password" placeholder="Şifrə" required>

        <button onclick="login()">Giriş et</button><br>
        <a href="register.html">Hesabınız yoxdursa qeydiyyatdan keçin</a>

        <div id="result"></div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const request = {
                username: username,
                password: password
            };

            const response = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(request)
            });

            const data = await response.json();

            if (response.ok && data.data) {
                localStorage.setItem("accessToken", data.data.token);
                localStorage.setItem("username", data.data.username);
                localStorage.setItem("role", data.data.role);
                document.getElementById("result").className = "success";
                document.getElementById("result").innerText = "Uğurla hesaba giriş edildi";
                setTimeout(() => {
                    if (data.data.role === "ADMIN") {
                        window.location.href = "admin.html";
                    } else if (data.data.role === "AIRLINE_MANAGER") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "main.html";
                    }
                }, 1000);
            } else {
                document.getElementById("result").className = "error";
                document.getElementById("result").innerText = data.message || "Giriş uğursuz oldu";
            }
        }
    </script>

</body>
</html>
