spring.application.name=flight-booking-name

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:flightbookingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.az.developia=DEBUG

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=mySecretKeyForFlightBookingSystemThatMustBeAtLeast256BitsForHS256
jwt.expiration=86400000

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# View Resolver
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.html

# Disable caching for development
spring.web.resources.cache.period=0

# Disable DevTools restart to avoid context issues
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false
